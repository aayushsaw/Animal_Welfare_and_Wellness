<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Login')}"></head>
<body class="bg-light">

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow border-0">
                <div class="card-body p-5">
                    <h3 class="card-title text-center mb-4 fw-bold">
                        <i class="bi bi-person-lock text-warning"></i> Login
                    </h3>

                    <!-- Error / Success alerts -->
                    <div th:if="${errorMsg}" class="alert alert-danger" th:text="${errorMsg}"></div>
                    <div th:if="${logoutMsg}" class="alert alert-success" th:text="${logoutMsg}"></div>
                    <div th:if="${param.registered}" class="alert alert-success">
                        Registration successful! Please login.
                    </div>

                    <!-- Spring Security processes POST /login -->
                    <form th:action="@{/login}" method="post">
                        <div class="mb-3">
                            <label for="username" class="form-label">Username</label>
                            <input type="text" class="form-control" id="username" name="username"
                                   placeholder="Enter username" required autofocus>
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" class="form-control" id="password" name="password"
                                   placeholder="Enter password" required>
                        </div>
                        <div class="d-grid">
                            <button type="submit" class="btn btn-warning fw-bold">
                                <i class="bi bi-box-arrow-in-right"></i> Login
                            </button>
                        </div>
                    </form>

                    <hr>
                    <p class="text-center mb-0">
                        Not a member?
                        <a th:href="@{/register}" class="text-warning fw-semibold">Register here</a>
                    </p>
                    <p class="text-center text-muted small mt-2">
                        Demo: <strong>Aayush</strong> / <strong>aayush123</strong>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
