<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Register')}"></head>
<body class="bg-light">

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow border-0">
                <div class="card-body p-5">
                    <h3 class="card-title text-center mb-4 fw-bold">
                        <i class="bi bi-person-plus text-warning"></i> Create Account
                    </h3>

                    <div th:if="${errorMsg}" class="alert alert-danger" th:text="${errorMsg}"></div>

                    <form th:action="@{/register}" th:object="${registrationDto}" method="post">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">First Name</label>
                                <input type="text" class="form-control" th:field="*{firstName}"
                                       placeholder="First name" required>
                                <span class="text-danger small" th:errors="*{firstName}"></span>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Last Name</label>
                                <input type="text" class="form-control" th:field="*{lastName}"
                                       placeholder="Last name" required>
                                <span class="text-danger small" th:errors="*{lastName}"></span>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Username</label>
                            <input type="text" class="form-control" th:field="*{username}"
                                   placeholder="Choose a username" required>
                            <span class="text-danger small" th:errors="*{username}"></span>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="password" class="form-control" th:field="*{password}"
                                   placeholder="Min. 6 characters" required>
                            <span class="text-danger small" th:errors="*{password}"></span>
                        </div>
                        <div class="mb-4">
                            <label class="form-label">Confirm Password</label>
                            <input type="password" class="form-control" th:field="*{confirmPassword}"
                                   placeholder="Repeat password" required>
                            <span class="text-danger small" th:errors="*{confirmPassword}"></span>
                        </div>
                        <div class="d-grid">
                            <button type="submit" class="btn btn-warning fw-bold">
                                <i class="bi bi-check-circle"></i> Register
                            </button>
                        </div>
                    </form>

                    <hr>
                    <p class="text-center mb-0">
                        Already a member?
                        <a th:href="@{/login}" class="text-warning fw-semibold">Login here</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
