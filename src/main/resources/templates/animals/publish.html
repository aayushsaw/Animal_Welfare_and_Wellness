<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Post a Stray Animal')}"></head>
<body class="bg-light">

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-7">
            <div class="card shadow border-0">
                <div class="card-body p-5">
                    <h3 class="fw-bold mb-4 text-center">
                        <i class="bi bi-plus-circle text-warning"></i> Found a Stray Animal?
                    </h3>
                    <p class="text-muted text-center mb-4">
                        Help them find a loving home by posting their details below.
                    </p>

                    <div th:if="${errorMsg}" class="alert alert-danger" th:text="${errorMsg}"></div>

                    <form th:action="@{/animals/publish}" th:object="${animalDto}"
                          method="post" enctype="multipart/form-data">

                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Animal Category *</label>
                                <select class="form-select" th:field="*{category}" required>
                                    <option value="">Select type</option>
                                    <option value="dog">Dog</option>
                                    <option value="cat">Cat</option>
                                    <option value="rabbit">Rabbit</option>
                                    <option value="other">Other</option>
                                </select>
                                <span class="text-danger small" th:errors="*{category}"></span>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Breed / Sub-category</label>
                                <select class="form-select" th:field="*{subcategory}">
                                    <option value="None">None / Unknown</option>
                                    <option value="Labrador">Labrador</option>
                                    <option value="German Shepherd">German Shepherd</option>
                                    <option value="Pomeranian">Pomeranian</option>
                                    <option value="Persian">Persian Cat</option>
                                    <option value="Siamese">Siamese Cat</option>
                                </select>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Where was it found? *</label>
                            <input type="text" class="form-control" th:field="*{location}"
                                   placeholder="e.g. Downtown Park, Main Street" required>
                            <span class="text-danger small" th:errors="*{location}"></span>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Color of the Animal</label>
                            <input type="text" class="form-control" th:field="*{color}"
                                   placeholder="e.g. Brown, Black and white">
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Additional Details</label>
                            <textarea class="form-control" th:field="*{description}" rows="3"
                                      placeholder="Size, health condition, special notes..."></textarea>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-semibold">Upload Animal Photo</label>
                            <input type="file" class="form-control" th:field="*{imageFile}"
                                   accept="image/*">
                            <div class="form-text">Max 5MB. JPG, PNG accepted.</div>
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-warning fw-bold btn-lg">
                                <i class="bi bi-send"></i> Post Stray Animal
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
