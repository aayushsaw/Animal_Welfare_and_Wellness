<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Adopt an Animal')}"></head>
<body class="bg-light">

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container my-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold"><i class="bi bi-search-heart text-warning"></i> Adopt an Animal</h2>
        <a th:href="@{/animals/publish}" class="btn btn-warning" sec:authorize="isAuthenticated()">
            <i class="bi bi-plus-circle"></i> Post a Stray
        </a>
    </div>

    <!-- Flash messages -->
    <div th:if="${successMsg}" class="alert alert-success alert-dismissible fade show">
        <i class="bi bi-check-circle"></i> <span th:text="${successMsg}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${errorMsg}" class="alert alert-danger alert-dismissible fade show">
        <i class="bi bi-exclamation-circle"></i> <span th:text="${errorMsg}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Category Filter -->
    <form th:action="@{/animals}" method="get" class="mb-4">
        <div class="input-group" style="max-width:400px">
            <select name="category" class="form-select">
                <option value="">All Animals</option>
                <option value="dog"    th:selected="${category == 'dog'}">Dogs</option>
                <option value="cat"    th:selected="${category == 'cat'}">Cats</option>
                <option value="rabbit" th:selected="${category == 'rabbit'}">Rabbits</option>
            </select>
            <button type="submit" class="btn btn-warning">
                <i class="bi bi-filter"></i> Filter
            </button>
        </div>
    </form>

    <!-- Animal Cards -->
    <div class="row g-4" th:if="${!animals.isEmpty()}">
        <div class="col-md-4" th:each="animal : ${animals}">
            <div class="card h-100 shadow-sm border-0 animal-card">
                <!-- Animal image -->
                <img th:src="${animal.imagePath != null ? animal.imagePath : '/images/placeholder.jpg'}"
                     class="card-img-top animal-img" alt="Stray Animal Photo">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-start mb-2">
                        <h5 class="card-title text-capitalize fw-bold mb-0"
                            th:text="${animal.category} + ' — ' + ${animal.subcategory}"></h5>
                        <span class="badge"
                              th:classappend="${animal.status.name() == 'AVAILABLE'} ? 'bg-success' : 'bg-secondary'"
                              th:text="${animal.status.name() == 'AVAILABLE'} ? 'Available' : 'Adopted'"></span>
                    </div>
                    <ul class="list-unstyled small text-muted mb-3">
                        <li><i class="bi bi-geo-alt"></i> <span th:text="${animal.location}"></span></li>
                        <li><i class="bi bi-palette"></i> Color: <span th:text="${animal.color}"></span></li>
                        <li><i class="bi bi-info-circle"></i> <span th:text="${animal.description}"></span></li>
                        <li><i class="bi bi-person"></i> Posted by: <span th:text="${animal.postedBy?.username}"></span></li>
                    </ul>

                    <!-- Adopt button — only for logged-in users on available animals -->
                    <form th:action="@{'/animals/' + ${animal.id} + '/adopt'}" method="post"
                          sec:authorize="isAuthenticated()"
                          th:if="${animal.status.name() == 'AVAILABLE'}">
                        <button type="submit" class="btn btn-warning w-100"
                                onclick="return confirm('Are you sure you want to adopt this animal?')">
                            <i class="bi bi-heart-fill"></i> Adopt
                        </button>
                    </form>
                    <div th:if="${animal.status.name() == 'ADOPTED'}" class="text-center text-muted small">
                        <i class="bi bi-house-heart"></i>
                        Adopted by <strong th:text="${animal.adoptedBy?.username}"></strong>
                    </div>
                    <div sec:authorize="!isAuthenticated()" th:if="${animal.status.name() == 'AVAILABLE'}">
                        <a th:href="@{/login}" class="btn btn-outline-warning w-100">
                            <i class="bi bi-lock"></i> Login to Adopt
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Empty state -->
    <div th:if="${animals.isEmpty()}" class="text-center py-5">
        <i class="bi bi-emoji-smile display-1 text-muted"></i>
        <h4 class="mt-3 text-muted">No animals found in this category.</h4>
        <a th:href="@{/animals}" class="btn btn-outline-warning mt-3">Show All Animals</a>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
