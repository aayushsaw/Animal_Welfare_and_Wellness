# ===========================
# BhootDaya Application Config
# ===========================

spring.application.name=animal-welfare

# Server
server.port=8080
server.servlet.context-path=/

# H2 In-Memory Database (swap with MySQL config below for production)
spring.datasource.url=jdbc:h2:mem:animalwelfaredb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 Console (accessible at /h2-console — useful for dev/demo)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Thymeleaf
spring.thymeleaf.cache=false

# File upload (for animal images)
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# Uploaded images stored here
app.upload.dir=uploads/animals

