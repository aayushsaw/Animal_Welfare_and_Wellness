version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: aw-db
    restart: always
    environment:
      POSTGRES_DB: animalwelfaredb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d animalwelfaredb"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./animal-welfare-java
      dockerfile: Dockerfile
    container_name: aw-backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DB_URL=jdbc:postgresql://db:5432/animalwelfaredb
      - DB_DRIVER=org.postgresql.Driver
      - DB_USERNAME=postgres
      - DB_PASSWORD=postgres
      - JWT_SECRET=ThisIsAVeryLongSecretKeyForJWTThatMustBeAtLeast256BitsLongForHS256Algorithm
      - H2_CONSOLE_ENABLED=false
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./animal-welfare-frontend
      dockerfile: Dockerfile
    container_name: aw-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
