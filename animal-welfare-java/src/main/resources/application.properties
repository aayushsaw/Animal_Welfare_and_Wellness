# =====================================================
# Animal Welfare and Wellness — Application Config
# All sensitive values must be set via environment
# variables in production. See .env.example
# =====================================================

spring.application.name=animal-welfare
server.port=${SERVER_PORT:8080}

# ===== Database =====
# Local dev uses H2. Set SPRING_PROFILES_ACTIVE=prod for PostgreSQL.
spring.datasource.url=${DB_URL:jdbc:h2:mem:animalwelfaredb;DB_CLOSE_DELAY=-1}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}

# ===== JPA / Hibernate =====
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ===== Flyway Migrations =====
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ===== H2 Console (dev only) =====
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:true}
spring.h2.console.path=/h2-console

# ===== JWT =====
app.jwt.secret=${JWT_SECRET:ThisIsAVeryLongSecretKeyForJWTThatMustBeAtLeast256BitsLongForHS256Algorithm}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:900000}
app.jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:604800000}

# ===== Cloudinary =====
app.cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:demo}
app.cloudinary.api-key=${CLOUDINARY_API_KEY:}
app.cloudinary.api-secret=${CLOUDINARY_API_SECRET:}

# ===== File Upload =====
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB

# ===== Swagger / OpenAPI =====
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ===== Actuator Observability =====
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.info.env.enabled=true
info.app.name=Animal Welfare and Wellness
info.app.description=Stray Animal Rescue and Community Adoption Platform
info.app.version=1.0.0

